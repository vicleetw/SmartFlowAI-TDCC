name: Auto TDCC Sync

on:
  schedule:
    # 1. 台灣時間週四、五、六、日 早上 09:00 執行 (UTC 01:00)
    - cron: '0 1 * * 4,5,6,0'
    # 2. 台灣時間週四、五、六、日 晚上 10:00 執行 (UTC 14:00)
    - cron: '0 14 * * 4,5,6,0'
  workflow_dispatch: # 手動觸發
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Fetch Script
        run: python fetch_tdcc.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv
          git commit -m "Update TDCC Data: $(date +'%Y-%m-%d')" || exit 0
          git push
